<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f0f0f0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e0e0e" media="(prefers-color-scheme: dark)" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <!-- Applied before first paint to avoid a light/dark flash on load. -->
    <script>
      try {
        var t = localStorage.getItem('mettel:theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (t === 'dark') document.documentElement.classList.add('dark');
      } catch (e) {}
    </script>
    <meta
      name="description"
      content="MetTel — designed objects for everyday life. Phone coverage, audio, accessories, and lifestyle goods, engineered to last."
    />
    <title>MetTel — Engineered Everyday Objects</title>

    <!-- Open Graph / social share -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MetTel" />
    <meta property="og:title" content="MetTel — Engineered Everyday Objects" />
    <meta
      property="og:description"
      content="Designed objects for everyday life — phone coverage, audio, accessories, and lifestyle goods. Built in India, shipped worldwide."
    />
    <meta property="og:url" content="https://www.mettel.in" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MetTel — Engineered Everyday Objects" />
    <meta
      name="twitter:description"
      content="Designed objects for everyday life — phone coverage, audio, accessories, and lifestyle goods. Built in India, shipped worldwide."
    />

    <!-- Type system: Archivo (display), Space Grotesk (grotesk), Space Mono (specs), Silkscreen (pixel) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&family=Silkscreen:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
